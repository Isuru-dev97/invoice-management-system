name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Check Backend
      - name: Run Server Check
        run: |
          cd server
          npm install
          node index.js &
          SERVER_PID=$!
          sleep 5
          kill $SERVER_PID

      # Check Frontend
      - name: Install Client Dependencies
        run: |
          cd client
          npm install
          npm run build